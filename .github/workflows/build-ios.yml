# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Compilar IPA de iOS
on:
  workflow_dispatch: # Permite iniciar la compilación manualmente desde GitHub

env:
  EXPO_PUBLIC_SUPABASE_URL: "https://pfmiqvmxmfcjchruhnjc.supabase.co"
  EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "sb_publishable_dEiEzmF0zyHmqbQpVdoe_g_uUdWjFK6"

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Clonar Repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configurar pnpm de forma segura
        uses: pnpm/action-setup@v3
        with:
          version: 11
          run_install: false

      - name: Obtener directorio del store de pnpm
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Configurar caché para pnpm
        uses: actions/cache@v4
        with:
          path: "${{ env.STORE_PATH }}"
          key: "${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}"
          restore-keys: "${{ runner.os }}-pnpm-store-"

      - name: Instalar Dependencias
        run: pnpm install --no-frozen-lockfile

      - name: Generar Proyecto Nativo iOS
        run: pnpm dlx expo prebuild --platform ios

      - name: Configurar CocoaPods (sin firma + flags de Folly)
        run: |
          python3 -c "
          with open('ios/Podfile', 'r') as file:
              content = file.read()
          target_str = 'post_install do |installer|'
          replacement = '''post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings[\'CODE_SIGNING_ALLOWED\'] = \'NO\'
                config.build_settings[\'CODE_SIGNING_REQUIRED\'] = \'NO\'
                config.build_settings[\'CODE_SIGN_IDENTITY\'] = \'\'
                config.build_settings[\'EXPANDED_CODE_SIGN_IDENTITY\'] = \'\'
                config.build_settings[\'OTHER_CFLAGS\'] ||= \'$(inherited)\'
                config.build_settings[\'OTHER_CFLAGS\'] << \' -DFOLLY_CFG_NO_COROUTINES=1\'
                config.build_settings[\'OTHER_CPLUSPLUSFLAGS\'] ||= \'$(inherited)\'
                config.build_settings[\'OTHER_CPLUSPLUSFLAGS\'] << \' -DFOLLY_CFG_NO_COROUTINES=1\'
              end
            end'''
          content = content.replace(target_str, replacement)
          with open('ios/Podfile', 'w') as file:
              file.write(content)
          "

      - name: Instalar CocoaPods
        run: cd ios && pod install

      - name: Compilar App (.app sin firmar)
        run: |
          xcodebuild -workspace ios/Vantage.xcworkspace \
                     -scheme Vantage \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build/DerivedData \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     PROVISIONING_PROFILE="" \
                     clean build

      - name: Estructura del .app bundle
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release-iphoneos/Vantage.app"
          echo "=== Contenido actual del .app ==="
          ls -la "$APP_PATH/"
          
          echo ""
          echo "=== Dependencias dinámicas del ejecutable ==="
          otool -L "$APP_PATH/Vantage" | head -30

      - name: Crear Estructura de IPA
        run: |
          mkdir -p build/Payload
          ditto build/DerivedData/Build/Products/Release-iphoneos/Vantage.app build/Payload/Vantage.app
          cd build
          zip -y -r Vantage.ipa Payload
          echo "=== Tamaño del IPA ==="
          ls -lh Vantage.ipa

      - name: Subir Archivo IPA
        uses: actions/upload-artifact@v4
        with:
          name: Vantage-iOS-App
          path: build/Vantage.ipa
